server {
    listen 80;
    client_max_body_size 600M;

    # Re-resolve the `api` hostname at runtime via Docker's embedded DNS instead
    # of caching its IP at startup. Without this, restarting the api container
    # (every deploy) changes its IP and nginx keeps proxying to the dead one ->
    # transient 502s that upstream gateways/clients cache as "service down".
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        # Variable upstream forces per-request DNS resolution (uses the resolver
        # above), so a restarted api container is picked up within ~10s.
        set $api_upstream api;
        proxy_pass http://$api_upstream:8009;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;
        proxy_connect_timeout 5s;

        # Ride through brief api unavailability (restart window) by retrying
        # rather than surfacing the error to the client.
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 20s;
    }
}
