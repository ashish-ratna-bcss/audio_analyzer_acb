services:
  nginx:
    image: nginx:latest
    ports: ["443:443", "80:80"]
    volumes:
      - ./nginx/forensic.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [api]
    restart: unless-stopped

  api:
    build:
      context: .
      args:
        INSTALL_NEMO: "${INSTALL_NEMO:-false}"
    image: forensic-audio
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+psycopg2://pipeline:pipeline@postgres:5432/forensic
      - REDIS_URL=redis://redis:6379/0
      - CASE_STORE_PATH=/data/forensic-audio
    command: ["/bin/bash", "/app/docker-entrypoint-api.sh"]
    volumes:
      - case_data:/data/forensic-audio
    depends_on: [redis, postgres]
    restart: unless-stopped

  redis:
    image: redis:7
    volumes: [redis_data:/data]
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_DB=forensic
      - POSTGRES_USER=pipeline
      - POSTGRES_PASSWORD=pipeline
    volumes: [pg_data:/var/lib/postgresql/data]
    restart: unless-stopped

  worker-cpu:
    image: forensic-audio
    build:
      context: .
      args:
        INSTALL_NEMO: "${INSTALL_NEMO:-false}"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+psycopg2://pipeline:pipeline@postgres:5432/forensic
      - REDIS_URL=redis://redis:6379/0
      - CASE_STORE_PATH=/data/forensic-audio
    command: celery -A pipeline.celery_app worker -Q cpu_queue --concurrency=4 -n cpu@%h
    volumes:
      - case_data:/data/forensic-audio
      - model_cache:/app/model_cache
    depends_on: [redis, postgres]
    restart: unless-stopped

  worker-gpu:
    image: forensic-audio
    build:
      context: .
      args:
        INSTALL_NEMO: "${INSTALL_NEMO:-false}"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+psycopg2://pipeline:pipeline@postgres:5432/forensic
      - REDIS_URL=redis://redis:6379/0
      - CASE_STORE_PATH=/data/forensic-audio
      - CUDA_VISIBLE_DEVICES=0
    command: celery -A pipeline.celery_app worker -Q gpu_queue --concurrency=1 --pool=solo -n gpu@%h
    volumes:
      - case_data:/data/forensic-audio
      - model_cache:/app/model_cache
      - hf_cache:/root/.cache/huggingface
    depends_on: [redis, postgres]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  flower:
    image: forensic-audio
    build:
      context: .
      args:
        INSTALL_NEMO: "${INSTALL_NEMO:-false}"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    command: celery -A pipeline.celery_app flower --port=5555
    ports: ["5555:5555"]
    depends_on: [redis]
    restart: unless-stopped

volumes:
  case_data:
  redis_data:
  pg_data:
  model_cache:
  hf_cache:
