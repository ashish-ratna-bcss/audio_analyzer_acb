server {
    listen 80;
    client_max_body_size 600M;

    # Re-resolve the `api` hostname at runtime via Docker's embedded DNS instead
    # of caching its IP at startup. Without this, restarting the api container
    # (every deploy) changes its IP and nginx keeps proxying to the dead one ->
    # transient 502s that upstream gateways/clients cache as "service down".
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Shared gateway for the co-located OCR service: the app backend calls this
    # host with an /ocr/* prefix expecting it routed to ocr-api:8000 (which serves
    # /jobs, /jobs/{id}, /jobs/{id}/result with NO prefix). Strip /ocr/ then proxy.
    # ocr-api shares the app_default docker network, resolved at runtime like api.
    location /ocr/ {
        # `set` must precede `rewrite ... break` — break stops the rewrite phase,
        # so a `set` after it never runs (leaves $ocr_upstream uninitialized -> 500).
        set $ocr_upstream ocr-api;
        rewrite ^/ocr/(.*)$ /$1 break;
        proxy_pass http://$ocr_upstream:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 5s;
        proxy_request_buffering off;     # stream large scanned-PDF uploads
        client_max_body_size 300m;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
    }

    location / {
        # Variable upstream forces per-request DNS resolution (uses the resolver
        # above), so a restarted api container is picked up within ~10s.
        set $api_upstream api;
        proxy_pass http://$api_upstream:8009;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;
        proxy_connect_timeout 5s;

        # Ride through brief api unavailability (restart window) by retrying
        # rather than surfacing the error to the client.
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 20s;
    }
}
